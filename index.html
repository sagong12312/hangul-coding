<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글과 코딩 · Hangul &amp; Coding</title>
<link rel="canonical" href="https://hangul-coding.com/main">
<!-- JS가 꺼져 있어도 이동 -->
<meta http-equiv="refresh" content="0; url=/main">
<script>
  // 가장 빠른 이동. replace를 써서 뒤로가기 무한루프 방지
  location.replace("/main");
</script>
<style>
  html,body{height:100%;margin:0;background:#1a2235}
</style>
</head>
<body>
<!-- JS와 meta refresh 둘 다 막혔을 때를 위한 수동 링크 -->
<noscript>
  <p style="font-family:sans-serif;color:#e4e7ef;padding:24px">
    <a href="/main" style="color:#5b8def">한글과 코딩으로 이동하기</a>
  </p>
</noscript>
</body>
</html>
